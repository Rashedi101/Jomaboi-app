<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Jomaboi — Digital Savings Circles</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&family=Nunito:wght@800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ── DESIGN TOKENS ─────────────────────────────────────────────── */
:root {
  --primary: #4647d3;
  --primary-dim: #3939c7;
  --primary-container: #9396ff;
  --on-primary: #f4f1ff;
  --secondary: #815100;
  --secondary-container: #ffc885;
  --secondary-dim: #ffb554;
  --on-secondary: #fff0e3;
  --tertiary: #006947;
  --tertiary-container: #69f6b8;
  --on-tertiary: #c8ffe0;
  --on-tertiary-container: #005a3c;
  --surface: #f5f7f9;
  --surface-lowest: #ffffff;
  --surface-low: #eef1f3;
  --surface-container: #e5e9eb;
  --surface-high: #dfe3e6;
  --on-surface: #2c2f31;
  --on-surface-variant: #595c5e;
  --outline: #747779;
  --outline-variant: #abadaf;
  --error: #b41340;
  --error-container: #f74b6d;
  --on-error-container: #510017;
  --kinetic: linear-gradient(135deg, #4647d3 0%, #ffb554 100%);
  --hero: linear-gradient(135deg, #4647d3 0%, #9396ff 100%);
  --shadow-primary: 0 8px 24px rgba(70,71,211,0.2);
  --shadow-float: 0 16px 40px rgba(44,47,49,0.08);
  --shadow-error: 0 8px 24px rgba(180,19,64,0.15);
}

/* ── RESET & BASE ──────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--surface);
  color: var(--on-surface);
  -webkit-font-smoothing: antialiased;
}

/* ── APP SHELL ─────────────────────────────────────────────────── */
#app {
  max-width: 440px;
  margin: 0 auto;
  height: 100vh;
  display: flex;
  flex-direction: column;
  position: relative;
  background: var(--surface);
  overflow: hidden;
}

/* ── TOP BAR ───────────────────────────────────────────────────── */
#topbar {
  background: var(--surface-lowest);
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
  z-index: 100;
}
.topbar-logo { display: flex; align-items: center; }
.logo-text { font-weight: 900; font-size: 1rem; color: var(--on-surface); letter-spacing: -0.02em; }
.accent-bar {
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-container));
  flex-shrink: 0;
}

/* ── CONTENT AREA ──────────────────────────────────────────────── */
#content {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  padding-bottom: 90px;
  scroll-behavior: smooth;
}
#content::-webkit-scrollbar { display: none; }

/* ── BOTTOM NAV ────────────────────────────────────────────────── */
#bottom-nav {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: var(--surface-lowest);
  box-shadow: 0 -4px 20px rgba(44,47,49,0.06);
  display: flex;
  justify-content: space-around;
  padding: 8px 0 12px;
  z-index: 100;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: none; cursor: pointer;
  padding: 4px 12px; min-width: 56px;
  color: var(--outline); font-family: 'Manrope', sans-serif;
  transition: color 0.15s;
}
.nav-item.active { color: var(--primary); }
.nav-icon-wrap {
  width: 36px; height: 28px;
  border-radius: 999px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  transition: background 0.2s;
}
.nav-item.active .nav-icon-wrap { background: rgba(70,71,211,0.1); }
.nav-label { font-size: 0.58rem; font-weight: 600; letter-spacing: 0.02em; }

/* ── CHIPS ─────────────────────────────────────────────────────── */
.chip {
  display: inline-flex; align-items: center;
  font-size: 0.68rem; font-weight: 700;
  padding: 3px 10px; border-radius: 999px;
  font-family: 'Manrope', sans-serif;
  white-space: nowrap; letter-spacing: 0.02em;
}
.chip-primary { background: rgba(70,71,211,0.12); color: var(--primary); }
.chip-green { background: rgba(0,105,71,0.12); color: var(--tertiary); }
.chip-amber { background: rgba(255,181,84,0.2); color: var(--secondary); }
.chip-error { background: rgba(180,19,64,0.12); color: var(--error); }
.chip-gray { background: var(--surface-high); color: var(--outline); }
.chip-blue { background: rgba(59,130,246,0.12); color: #2563eb; }

/* ── ASYMMETRIC CARD ───────────────────────────────────────────── */
.asym-card {
  background: var(--hero);
  border-radius: 3rem 1.5rem 3rem 1.5rem;
  padding: 1.5rem;
  box-shadow: var(--shadow-primary);
  color: white;
  position: relative; overflow: hidden;
}
.asym-card.kinetic { background: var(--kinetic); }
.asym-card.green { background: linear-gradient(135deg, #006947, #69f6b8); }
.asym-card.amber { background: linear-gradient(135deg, #815100, #ffb554); }
.asym-card .deco {
  position: absolute; right: -30px; bottom: -30px;
  width: 120px; height: 120px;
  background: rgba(255,255,255,0.1);
  border-radius: 50%;
}

/* ── SURFACE CARDS ─────────────────────────────────────────────── */
.sfc { background: var(--surface-lowest); border-radius: 1rem; padding: 1.1rem; }
.sfc-low { background: var(--surface-low); border-radius: 1rem; padding: 1.1rem; }

/* ── BUTTONS ───────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  border: none; cursor: pointer; border-radius: 999px;
  font-family: 'Manrope', sans-serif; font-weight: 700;
  transition: opacity 0.15s, transform 0.1s;
  letter-spacing: 0.01em; text-decoration: none;
}
.btn:hover { opacity: 0.85; }
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--primary); color: var(--on-primary); padding: 11px 22px; font-size: 0.84rem; box-shadow: var(--shadow-primary); }
.btn-kinetic { background: var(--kinetic); color: white; padding: 13px 22px; font-size: 0.88rem; box-shadow: var(--shadow-primary); }
.btn-tonal { background: rgba(70,71,211,0.12); color: var(--primary); padding: 11px 22px; font-size: 0.84rem; }
.btn-ghost { background: var(--surface-low); color: var(--on-surface); padding: 11px 22px; font-size: 0.84rem; }
.btn-danger { background: rgba(180,19,64,0.12); color: var(--error); padding: 11px 22px; font-size: 0.84rem; }
.btn-success { background: rgba(0,105,71,0.12); color: var(--tertiary); padding: 11px 22px; font-size: 0.84rem; }
.btn-sm { padding: 6px 14px; font-size: 0.72rem; }
.btn-full { width: 100%; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── SECTION HEADER ────────────────────────────────────────────── */
.sh { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.sh-title { font-size: 1.05rem; font-weight: 800; color: var(--on-surface); letter-spacing: -0.01em; }
.sh-label { font-size: 0.62rem; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.2em; font-family: 'Manrope', sans-serif; margin-bottom: 3px; }

/* ── INPUTS ────────────────────────────────────────────────────── */
.input-group { margin-bottom: 1rem; }
.input-label { display: block; font-size: 0.68rem; font-weight: 700; color: var(--on-surface-variant); margin-bottom: 5px; font-family: 'Manrope', sans-serif; text-transform: uppercase; letter-spacing: 0.08em; }
.input-field, .select-field, .textarea-field {
  width: 100%; padding: 11px 14px; border-radius: 12px;
  border: none; background: var(--surface-low);
  font-size: 0.85rem; font-family: 'Plus Jakarta Sans', sans-serif;
  color: var(--on-surface); outline: none; transition: box-shadow 0.2s;
}
.input-field:focus, .select-field:focus, .textarea-field:focus {
  box-shadow: 0 0 0 2px rgba(70,71,211,0.3);
}
.textarea-field { resize: none; height: 80px; }
.input-note { font-size: 0.67rem; color: var(--outline); margin-top: 4px; font-family: 'Manrope', sans-serif; }

/* ── PROGRESS BAR ──────────────────────────────────────────────── */
.prog-bar { background: var(--surface-high); border-radius: 999px; height: 5px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 999px; transition: width 0.5s ease; }
.prog-primary { background: linear-gradient(90deg, var(--primary), var(--primary-container)); }
.prog-green { background: var(--tertiary); }
.prog-error { background: var(--error); }
.prog-amber { background: var(--secondary-dim); }

/* ── STATUS DOT ────────────────────────────────────────────────── */
.status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; flex-shrink: 0; }
.dot-paid { background: var(--tertiary); }
.dot-overdue { background: var(--error); }
.dot-pending { background: var(--secondary-dim); }
.dot-advance { background: var(--primary); }

/* ── TABLE ─────────────────────────────────────────────────────── */
.data-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; font-family: 'Manrope', sans-serif; }
.data-table th { padding: 8px 6px; text-align: left; color: var(--outline); font-weight: 700; font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.06em; background: var(--surface-low); }
.data-table td { padding: 10px 6px; border-top: 1px solid var(--surface-container); }
.data-table tr:hover td { background: rgba(70,71,211,0.03); }

/* ── ALERT BANNER ──────────────────────────────────────────────── */
.alert-banner {
  background: var(--error-container);
  border-radius: 1rem; padding: 1rem 1.25rem;
  display: flex; justify-content: space-between;
  align-items: center; gap: 1rem;
  position: relative; overflow: hidden;
}
.alert-deco {
  position: absolute; right: -40px; bottom: -40px;
  width: 130px; height: 130px;
  background: var(--error); border-radius: 50%; opacity: 0.2;
}

/* ── BACK BUTTON ───────────────────────────────────────────────── */
.back-btn {
  background: rgba(70,71,211,0.1); border: none;
  color: var(--primary); font-size: 0.8rem; font-weight: 700;
  cursor: pointer; padding: 6px 14px; border-radius: 999px;
  margin-bottom: 1.25rem; font-family: 'Manrope', sans-serif;
  display: inline-block;
}

/* ── CIRCLE CARDS (horizontal scroll) ─────────────────────────── */
.scroll-row { display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 0.75rem; }
.scroll-row::-webkit-scrollbar { display: none; }

/* ── RECEIPT UPLOAD ────────────────────────────────────────────── */
.upload-box {
  border: 2px dashed var(--outline-variant);
  border-radius: 12px; padding: 1rem;
  text-align: center; cursor: pointer;
  transition: all 0.2s; margin-bottom: 1.25rem;
}
.upload-box.uploaded { border-color: var(--tertiary); background: rgba(105,246,184,0.1); }

/* ── STEP INDICATOR ────────────────────────────────────────────── */
.steps { display: flex; align-items: center; margin-bottom: 1.75rem; }
.step-bubble {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.72rem; font-weight: 800;
  font-family: 'Manrope', sans-serif;
  flex-shrink: 0; transition: all 0.3s;
}
.step-bubble.done { background: var(--primary); color: white; }
.step-bubble.current { background: var(--primary); color: white; }
.step-bubble.future { background: var(--surface-high); color: var(--outline); }
.step-label { font-size: 0.58rem; color: var(--outline); font-family: 'Manrope', sans-serif; font-weight: 700; text-align: center; margin-top: 3px; white-space: nowrap; }
.step-line { flex: 1; height: 2px; background: var(--surface-high); margin: 0 4px; margin-bottom: 16px; transition: all 0.3s; }
.step-line.done { background: var(--primary); }

/* ── LOGIN SCREEN ──────────────────────────────────────────────── */
#login-screen {
  position: fixed; inset: 0;
  background: linear-gradient(160deg, var(--primary-dim) 0%, var(--primary) 50%, rgba(255,181,84,0.2) 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 1.5rem; z-index: 999;
  font-family: 'Plus Jakarta Sans', sans-serif;
}
#login-screen.hidden { display: none; }
.login-logo { text-align: center; margin-bottom: 2rem; }
.login-sub { color: rgba(255,255,255,0.75); font-size: 0.72rem; font-weight: 700; letter-spacing: 0.18em; font-family: 'Manrope', sans-serif; text-transform: uppercase; }
.login-card {
  background: rgba(255,255,255,0.97);
  border-radius: 20px; padding: 2rem 1.75rem;
  width: 100%; max-width: 380px;
  box-shadow: 0 20px 60px rgba(60,60,150,0.3);
}
.role-toggle { display: flex; background: var(--surface-low); padding: 4px; border-radius: 14px; margin-bottom: 1.5rem; }
.role-btn {
  flex: 1; padding: 10px; border-radius: 11px; border: none;
  font-size: 0.82rem; font-weight: 700; cursor: pointer;
  font-family: 'Manrope', sans-serif; transition: all 0.2s;
  background: transparent; color: var(--outline);
}
.role-btn.active { background: var(--primary); color: white; box-shadow: var(--shadow-float); }
.login-input-group { margin-bottom: 1rem; }
.login-label { display: block; font-size: 0.7rem; font-weight: 700; color: var(--on-surface-variant); margin-bottom: 5px; font-family: 'Manrope', sans-serif; letter-spacing: 0.08em; }
.login-input {
  width: 100%; padding: 12px 14px; border-radius: 10px;
  border: 1.5px solid var(--surface-high);
  background: white; font-size: 0.85rem;
  font-family: 'Plus Jakarta Sans', sans-serif;
  color: var(--on-surface); outline: none; transition: border-color 0.2s;
}
.login-input:focus { border-color: var(--primary); }
.trust-row { display: flex; gap: 0.75rem; margin-top: 1.25rem; }
.trust-badge {
  flex: 1; background: var(--surface-low);
  border-radius: 10px; padding: 0.75rem;
  text-align: center;
}
.trust-icon { font-size: 1.2rem; margin-bottom: 4px; }
.trust-title { font-size: 0.72rem; font-weight: 800; color: var(--on-surface); font-family: 'Plus Jakarta Sans', sans-serif; }
.trust-sub { font-size: 0.62rem; color: var(--outline); font-family: 'Manrope', sans-serif; }

/* ── ANIMATIONS ────────────────────────────────────────────────── */
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
.fade-in { animation: fadeIn 0.3s ease forwards; }
.slide-up { animation: slideUp 0.35s ease forwards; }

/* ── MISC ──────────────────────────────────────────────────────── */
.gap-1 { gap: 0.5rem; }
.gap-2 { gap: 0.75rem; }
.mb-1 { margin-bottom: 0.75rem; }
.mb-2 { margin-bottom: 1.1rem; }
.mb-3 { margin-bottom: 1.5rem; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
.flex-row { display: flex; gap: 0.65rem; }
.flex-row.wrap { flex-wrap: wrap; }
.text-sm { font-size: 0.82rem; color: var(--on-surface-variant); }
.text-xs { font-size: 0.72rem; color: var(--outline); font-family: 'Manrope', sans-serif; }
.text-label { font-size: 0.62rem; color: var(--outline); font-family: 'Manrope', sans-serif; text-transform: uppercase; letter-spacing: 0.08em; }
.font-bold { font-weight: 800; }
.text-primary { color: var(--primary); }
.text-green { color: var(--tertiary); }
.text-amber { color: var(--secondary); }
.text-error { color: var(--error); }
.success-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 55vh; text-align: center; }
.success-icon { width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 1rem; }
.divider { height: 1px; background: var(--surface-container); margin: 0; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-logo">
    <!-- Full Jomaboi wordmark SVG — exact match to brand logo -->
    <svg viewBox="0 0 268 68" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:220px;height:auto;filter:drop-shadow(0 4px 16px rgba(120,120,240,0.3))">
      <!-- J -->
      <text x="0" y="55" font-family="Nunito,sans-serif" font-weight="900" font-size="54" fill="#ffffff">J</text>
      <!-- om -->
      <text x="30" y="55" font-family="Nunito,sans-serif" font-weight="900" font-size="54" fill="#ffffff">om</text>
      <!-- Orange "a" character mark -->
      <g transform="translate(118, 4)">
        <!-- Left antenna -->
        <path d="M 14,20 Q 7,11 2,4" stroke="#F5A623" stroke-width="5" stroke-linecap="round" fill="none"/>
        <circle cx="2" cy="4" r="4.5" fill="#F5A623"/>
        <!-- Right antenna -->
        <path d="M 31,14 Q 38,7 44,2" stroke="#F5A623" stroke-width="5" stroke-linecap="round" fill="none"/>
        <circle cx="44" cy="2" r="4.5" fill="#F5A623"/>
        <!-- Main body circle -->
        <circle cx="22" cy="37" r="22" fill="#F5A623"/>
        <!-- Right vertical bar (the "a" leg) -->
        <rect x="40" y="15" width="8" height="46" rx="4" fill="#F5A623"/>
        <!-- White inner circle (hollow eye) -->
        <circle cx="20" cy="37" r="12" fill="rgba(255,255,255,0.25)"/>
        <!-- Orange inner pupil -->
        <circle cx="20" cy="37" r="6" fill="#F5A623" opacity="0.6"/>
      </g>
      <!-- boi -->
      <text x="172" y="55" font-family="Nunito,sans-serif" font-weight="900" font-size="54" fill="#ffffff">boi</text>
    </svg>
    <div class="login-sub" style="margin-top:10px">Community Wealth Portal</div>
  </div>
  <div class="login-card">
    <div class="role-toggle">
      <button class="role-btn active" onclick="setRole('member')" id="role-member">👤 Member</button>
      <button class="role-btn" onclick="setRole('admin')" id="role-admin">⚙️ Admin</button>
    </div>
    <div class="login-input-group">
      <label class="login-label">ACCESS ID</label>
      <input class="login-input" type="email" id="login-email" placeholder="your.name@jomaboi.co"/>
    </div>
    <div class="login-input-group">
      <label class="login-label">ACCESS TOKEN</label>
      <input class="login-input" type="password" id="login-pass" placeholder="••••••••••••"/>
    </div>
    <button class="btn btn-kinetic btn-full" style="margin-top:0.5rem" onclick="doLogin()">Enter Portal →</button>
    <div class="trust-row">
      <div class="trust-badge"><div class="trust-icon">👥</div><div class="trust-title">24k+ Members</div><div class="trust-sub">Growing daily</div></div>
      <div class="trust-badge"><div class="trust-icon">🛡️</div><div class="trust-title">Vault Secured</div><div class="trust-sub">Shariah compliant</div></div>
    </div>
    <div style="text-align:center;margin-top:1rem"><span class="text-xs">Demo: any email + password</span></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <!-- TOP BAR -->
  <div id="topbar">
    <div class="topbar-logo">
      <!-- Jomaboi wordmark — purple + orange on white topbar -->
      <svg viewBox="0 0 268 68" fill="none" xmlns="http://www.w3.org/2000/svg" style="height:28px;width:auto">
        <!-- J -->
        <text x="0" y="55" font-family="Nunito,sans-serif" font-weight="900" font-size="54" fill="#7878F0">J</text>
        <!-- om -->
        <text x="30" y="55" font-family="Nunito,sans-serif" font-weight="900" font-size="54" fill="#7878F0">om</text>
        <!-- Orange "a" character mark -->
        <g transform="translate(118, 4)">
          <!-- Left antenna -->
          <path d="M 14,20 Q 7,11 2,4" stroke="#F5A623" stroke-width="5" stroke-linecap="round" fill="none"/>
          <circle cx="2" cy="4" r="4.5" fill="#F5A623"/>
          <!-- Right antenna -->
          <path d="M 31,14 Q 38,7 44,2" stroke="#F5A623" stroke-width="5" stroke-linecap="round" fill="none"/>
          <circle cx="44" cy="2" r="4.5" fill="#F5A623"/>
          <!-- Main body circle -->
          <circle cx="22" cy="37" r="22" fill="#F5A623"/>
          <!-- Right vertical bar (the "a" leg) -->
          <rect x="40" y="15" width="8" height="46" rx="4" fill="#F5A623"/>
          <!-- White inner circle (hollow eye) -->
          <circle cx="20" cy="37" r="12" fill="white"/>
          <!-- Orange inner pupil -->
          <circle cx="20" cy="37" r="6" fill="#F5A623"/>
        </g>
        <!-- boi -->
        <text x="172" y="55" font-family="Nunito,sans-serif" font-weight="900" font-size="54" fill="#7878F0">boi</text>
      </svg>
    </div>
    <div id="role-chip" class="chip chip-amber">Admin</div>
  </div>
  <div class="accent-bar"></div>

  <!-- CONTENT -->
  <div id="content"></div>

  <!-- BOTTOM NAV -->
  <div id="bottom-nav"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let STATE = {
  role: 'member',
  screen: 'dashboard',
  activeCircle: null,
  activePayment: null,
  activeLedger: null,
  rentalScreen: 'ledger-dashboard',
  profileSection: null,
  setupStep: 1,
  setupForm: {},
  logForm: {},
  chatLog: [{ from:'agent', text:"Hello! I'm your Jomaboi assistant. How can I help today? 🌿" }]
};

// ═══════════════════════════════════════════════════════════════
// MOCK DATA

function setRole(r) {
  STATE.role = r;
  document.getElementById('role-member').className = 'role-btn' + (r==='member'?' active':'');
  document.getElementById('role-admin').className = 'role-btn' + (r==='admin'?' active':'');
}
function doLogin() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('role-chip').textContent = STATE.role==='admin'?'Admin':'Member';
  document.getElementById('role-chip').className = 'chip ' + (STATE.role==='admin'?'chip-amber':'chip-primary');
  buildNav();
  navigate('dashboard');
}

// ═══════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════
const adminNavItems = [
  {id:'dashboard',icon:'🏠',label:'Home'},
  {id:'transactions',icon:'💳',label:'Payments'},
  {id:'rent',icon:'🏘️',label:'Rent'},
  {id:'payout',icon:'💰',label:'Payouts'},
  {id:'profile',icon:'👤',label:'Profile'}
];
const memberNavItems = [
  {id:'dashboard',icon:'🏠',label:'Home'},
  {id:'profile',icon:'👤',label:'Profile'}
];

function buildNav() {
  const items = STATE.role==='admin'?adminNavItems:memberNavItems;
  document.getElementById('bottom-nav').innerHTML = items.map(n=>`
    <button class="nav-item ${STATE.screen===n.id?'active':''}" onclick="navigate('${n.id}')" id="nav-${n.id}">
      <div class="nav-icon-wrap">${n.icon}</div>
      <span class="nav-label">${n.label}</span>
    </button>`).join('');
}
function updateNav(s) {
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const active = ['transactions','payout','rent'].includes(s)?s:'dashboard';
  const el = document.getElementById('nav-'+active);
  if(el) el.classList.add('active');
  if(s==='profile') { document.getElementById('nav-profile')?.classList.add('active'); }
}
function navigate(screen) {
  STATE.screen = screen;
  STATE.rentalScreen = 'ledger-dashboard';
  STATE.profileSection = null;
  STATE.setupStep = 1;
  updateNav(screen);
  render();
}
function goBack() {
  if(STATE.profileSection) { STATE.profileSection=null; render(); return; }
  if(STATE.screen==='circle-detail'||STATE.screen==='record-payment'||STATE.screen==='broadcast'||STATE.screen==='create-circle') { navigate('dashboard'); return; }
  if(STATE.screen==='confirm-payment') { STATE.screen='record-payment'; render(); return; }
  navigate('dashboard');
}

// ═══════════════════════════════════════════════════════════════
// RENDER ROUTER
// ═══════════════════════════════════════════════════════════════
function render() {
  const c = document.getElementById('content');
  c.scrollTop = 0;
  let html = '';
  if(STATE.screen==='profile') { html = renderProfile(); }
  else if(STATE.role==='admin') {
    if(STATE.screen==='dashboard') html = renderAdminDash();
    else if(STATE.screen==='transactions') html = renderTransactions();
    else if(STATE.screen==='rent') html = renderRent();
    else if(STATE.screen==='payout') html = renderPayouts();
    else if(STATE.screen==='circle-detail') html = renderCircleDetail();
    else if(STATE.screen==='record-payment') html = renderRecordPayment();
    else if(STATE.screen==='confirm-payment') html = renderConfirmPayment();
    else if(STATE.screen==='broadcast') html = renderBroadcast();
    else if(STATE.screen==='create-circle') html = renderCreateCircle();
    else html = renderAdminDash();
  } else {
    html = renderMemberDash();
  }
  c.innerHTML = `<div class="fade-in">${html}</div>`;
  afterRender();
}

function afterRender() {
  // Draw charts after DOM update
  setTimeout(()=>{
    if(STATE.screen==='dashboard'&&STATE.role==='admin') drawAdminChart();
    if(STATE.screen==='dashboard'&&STATE.role==='member') drawMemberChart();
    if(STATE.screen==='rent'&&STATE.rentalScreen==='summary') drawRentalChart();
  }, 50);
}

function pct(v,m){return Math.min(100,Math.round((v/m)*100));}
function fmt(n){return Number(n||0).toLocaleString();}
function progBar(v,m,cls='prog-primary'){return`<div class="prog-bar"><div class="prog-fill ${cls}" style="width:${pct(v,m)}%"></div></div>`;}
function statusChip(s){
  const m={Paid:'chip-green',Overdue:'chip-error',Pending:'chip-amber',Active:'chip-green'};
  return `<span class="chip ${m[s]||'chip-gray'}">${s}</span>`;
}
function statusDot(s){const m={Paid:'dot-paid',Overdue:'dot-overdue',Pending:'dot-pending',Advance:'dot-advance'};return`<span class="status-dot ${m[s]||''}"></span>`;}
function txColor(t){return t==='credit'?'var(--tertiary)':'var(--secondary)';}

function drawAdminChart() {
  const ctx = document.getElementById('admin-chart');
  if(!ctx) return;
  // Destroy previous instance if any
  const existing = Chart.getChart(ctx);
  if(existing) existing.destroy();
  const totalIn  = transactions.filter(t=>t.type==='credit').reduce((a,t)=>a+t.amount,0);
  const totalOut = transactions.filter(t=>t.type==='debit').reduce((a,t)=>a+t.amount,0);
  const net      = Math.max(0, totalIn - totalOut);
  new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Contributions', 'Payouts', 'Net Balance'],
      datasets: [{
        data: [totalIn, totalOut, net],
        backgroundColor: ['rgba(0,105,71,0.85)', 'rgba(255,181,84,0.85)', 'rgba(70,71,211,0.85)'],
        borderColor: ['#ffffff','#ffffff','#ffffff'],
        borderWidth: 3,
        hoverOffset: 6
      }]
    },
    options: {
      responsive: false,
      cutout: '65%',
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` BDT ${Number(ctx.parsed).toLocaleString()}`
          },
          bodyFont: { family: 'Manrope', size: 11 },
          titleFont: { family: 'Manrope', size: 11 }
        }
      }
    }
  });
}

function circleCreated() {
  // Read values
  const name        = document.getElementById('cc-name')?.value.trim();
  const contribution= parseInt(document.getElementById('cc-contribution')?.value);
  const maxMembers  = parseInt(document.getElementById('cc-members')?.value);
  const totalCycles = parseInt(document.getElementById('cc-cycles')?.value) || maxMembers || 12;
  const type        = document.getElementById('cc-type')?.value || 'Private';
  const startDate   = document.getElementById('cc-date')?.value || new Date().toISOString().split('T')[0];
  const errEl       = document.getElementById('cc-error');

  // Validate
  if (!name) { showCCError('Please enter a circle name.'); return; }
  if (!contribution || contribution < 1) { showCCError('Please enter a valid monthly contribution.'); return; }
  if (!maxMembers || maxMembers < 2 || maxMembers > 50) { showCCError('Members must be between 2 and 50.'); return; }

  // Build new circle object
  const newCircle = {
    id: circles.length + 1,
    name,
    contribution,
    members: 0,
    current_cycle: 1,
    total_cycles: totalCycles,
    pot: 0,
    paid: 0,
    type,
    gradient: circleGradients[circles.length % circleGradients.length],
    startDate
  };

  // Add to array
  circles.push(newCircle);

  // Save to localStorage so it persists across refreshes
  try { localStorage.setItem('jomaboi_circles', JSON.stringify(circles)); } catch(e) {}

  // Show success then go to dashboard
  document.getElementById('content').innerHTML = `
    <div class="success-state fade-in">
      <div class="success-icon" style="background:var(--primary-container);font-size:2rem">⭕</div>
      <h2 style="font-size:1.3rem;font-weight:900;margin-bottom:.5rem">Circle Created!</h2>
      <p style="font-size:.88rem;color:var(--on-surface-variant);margin-bottom:.25rem"><strong>${name}</strong></p>
      <p class="text-sm" style="margin-bottom:1.5rem">BDT ${fmt(contribution)}/mo · ${type} · Up to ${maxMembers} members</p>
      <button class="btn btn-primary" onclick="navigate('dashboard')">← Back to Home</button>
    </div>`;
}

function showCCError(msg) {
  const el = document.getElementById('cc-error');
  if (el) { el.style.display = 'block'; el.textContent = '⚠️ ' + msg; }
}

function setSF(k,v){STATE.setupForm[k]=v;}
function nextStep(){
  const f = STATE.setupForm;
  // Validate step 2 before proceeding
  if(STATE.setupStep===2) {
    if(!f.property || !f.property.trim()) { alert('Please enter a property name.'); return; }
    if(!f.rent || parseInt(f.rent)<1) { alert('Please enter a valid monthly rent amount.'); return; }
  }
  if(STATE.setupStep<4) STATE.setupStep++;
  render();
}
function prevStep(){if(STATE.setupStep>1){STATE.setupStep--;render();}else{STATE.rentalScreen='ledger-dashboard';render();}}
function sendRentalInvite(){STATE.setupForm.inviteSent=true;render();}

function createLedger() {
  const f = STATE.setupForm;

  // Build the new ledger
  const newLedger = {
    id: ledgers.length + 1,
    type:     f.type     || 'House Rent',
    property: (f.property || f.address || 'Unnamed Property').trim(),
    role:     f.role     || 'Landlord',
    tenant:   f.role === 'Landlord' ? (f.cpName || 'Pending')  : 'Self',
    landlord: f.role === 'Tenant'   ? (f.cpName || 'Pending')  : 'Self',
    tenantPhone:   f.cpPhone || '',
    rent:     parseInt(f.rent)    || 0,
    dueDay:   parseInt(f.dueDay)  || 5,
    deposit:  parseInt(f.deposit) || 0,
    startDate: new Date().toISOString().split('T')[0],
    status:   'active',
    payments: []   // empty — admin will log payments manually
  };

  // Add to array
  ledgers.push(newLedger);

  // Persist to localStorage
  try { localStorage.setItem('jomaboi_ledgers', JSON.stringify(ledgers)); } catch(e) {}

  // Reset setup state
  STATE.setupStep = 1;
  STATE.setupForm = {};
  STATE.activeLedger = newLedger;

  // Show success then open the new ledger
  document.getElementById('content').innerHTML = `
    <div class="success-state fade-in">
      <div class="success-icon" style="background:var(--primary-container);font-size:2rem">🏠</div>
      <h2 style="font-size:1.3rem;font-weight:900;margin-bottom:.5rem">Ledger Created!</h2>
      <p style="font-size:.88rem;color:var(--on-surface-variant);margin-bottom:.25rem"><strong>${newLedger.property}</strong></p>
      <p class="text-sm" style="margin-bottom:.5rem">${newLedger.role} · BDT ${fmt(newLedger.rent)}/mo</p>
      <p class="text-xs" style="margin-bottom:1.5rem">Due on the ${newLedger.dueDay}${newLedger.dueDay===1?'st':newLedger.dueDay===2?'nd':newLedger.dueDay===3?'rd':'th'} of each month</p>
      <div class="flex-row" style="justify-content:center">
        <button class="btn btn-primary" onclick="rentalNav('ledger-overview')">Open Ledger →</button>
        <button class="btn btn-ghost" onclick="rentalNav('ledger-dashboard')">All Ledgers</button>
      </div>
    </div>`;
}

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">

        <select style="background:var(--surface-low);border:none;border-radius:999px;font-size:.72rem;font-family:Manrope,sans-serif;padding:4px 10px;color:var(--on-surface);outline:none"><option>Last 6 Months</option></select>

          </div>
          <div style="display:flex;gap:1.25rem">
            ${[['My Share',`BDT ${fmt(c.contribution)}/mo`],['Pool',`BDT ${fmt(c.pot)}`],['Cycle',`${c.current_cycle}/${c.total_cycles}`]].map(([k,v])=>`<div><div class="text-label">${k}</div><div style="font-size:.78rem;font-weight:700">${v}</div></div>`).join('')}

      <div style="font-size:.95rem;font-weight:800;margin-bottom:1rem">My Transactions</div>
      ${myTx.map(t=>`

}
function drawMemberChart(){
  const ctx=document.getElementById('member-chart');
  if(!ctx)return;
  new Chart(ctx,{type:'bar',data:{labels:savingsLabels,datasets:[{label:'Saved',data:savingsData,backgroundColor:savingsData.map((_,i)=>i===savingsData.length-1?'rgba(70,71,211,0.9)':'rgba(70,71,211,0.3)'),borderRadius:8,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{family:'Manrope',size:9},color:'#747779'}},y:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{font:{family:'Manrope',size:9},color:'#747779'}}}}});
}

function renderProfile(){
  const ps=STATE.profileSection;
  if(ps==='edit') return renderEditAccount();
  if(ps==='statement') return renderStatement();
  if(ps==='chat') return renderChat();
  if(ps==='nominee') return renderNominee();

  const menuItems=[
    {id:'edit',icon:'✏️',label:'Edit Account Information',desc:'Update name, phone & address'},
    {id:'statement',icon:'📄',label:'Statement',desc:'View & download savings history'},
    {id:'chat',icon:'🤖',label:'Chat with Agent',desc:'Get help from Jomaboi AI'},
    {id:'nominee',icon:'👨‍👩‍👦',label:'Nominee Information',desc:'Add or update your nominee'},
    {id:'logout',icon:'🚪',label:'Logout',desc:'Sign out of your account',danger:true}
  ];
  return`
    <div class="asym-card kinetic mb-3" style="text-align:center">
      <div class="deco"></div>
      <div style="width:68px;height:68px;background:rgba(255,255,255,.2);backdrop-filter:blur(8px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin:0 auto .85rem;border:3px solid rgba(255,255,255,.3)">R</div>
      <div style="font-weight:900;font-size:1.1rem">Rahim Uddin</div>
      <div style="font-size:.72rem;color:rgba(255,255,255,.7);font-family:Manrope,sans-serif;margin-top:2px">rahim@gmail.com · 01711-234567</div>
      <div style="margin-top:.75rem"><span class="chip ${STATE.role==='admin'?'chip-amber':'chip-primary'}" style="background:rgba(255,255,255,.2);color:white">${STATE.role==='admin'?'⚙️ Admin':'👤 Member'}</span></div>
    </div>
    ${menuItems.map(item=>`
      <div onclick="${item.danger?'doLogout()':'openProfileSection(\''+item.id+'\')'}"
        style="background:var(--surface-lowest);border-radius:1rem;padding:.9rem 1rem;display:flex;align-items:center;gap:.9rem;cursor:pointer;margin-bottom:.6rem;transition:transform .15s"
        onmouseenter="this.style.transform='scale(1.01)'" onmouseleave="this.style.transform='scale(1)'">
        <div style="width:42px;height:42px;background:${item.danger?'rgba(180,19,64,.1)':'rgba(70,71,211,.1)'};border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0">${item.icon}</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:.85rem;color:${item.danger?'var(--error)':'var(--on-surface)'}">${item.label}</div>
          <div class="text-xs" style="margin-top:1px">${item.desc}</div>
        </div>
        <span style="color:var(--outline-variant);font-size:.9rem">›</span>
      </div>`).join('')}
    <p class="text-xs" style="text-align:center;margin-top:1.5rem;letter-spacing:.05em">Jomaboi v5.0 · WhiteDoor Partners · 2026</p>`;
}
function openProfileSection(s){STATE.profileSection=s;render();}
function doLogout(){
  STATE.profileSection=null;
  document.getElementById('login-screen').classList.remove('hidden');
  STATE.screen='dashboard';
  STATE.role='member';
}

function renderEditAccount(){
  return`
    <button class="back-btn" onclick="closeProfileSection()">← Back</button>
    <h1 style="font-size:1.4rem;font-weight:900;letter-spacing:-.02em;margin-bottom:1.5rem">Edit Account</h1>
    <div class="sfc">
      <div style="display:flex;justify-content:center;margin-bottom:1.25rem">
        <div style="width:68px;height:68px;background:var(--kinetic);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;box-shadow:var(--shadow-primary)">R</div>
      </div>
      <div class="input-group"><label class="input-label">Full Name</label><input class="input-field" value="Rahim Uddin"/></div>
      <div class="input-group"><label class="input-label">Phone</label><input class="input-field" value="01711-234567"/></div>
      <div class="input-group"><label class="input-label">Email</label><input class="input-field" type="email" value="rahim@gmail.com"/></div>
      <div class="input-group"><label class="input-label">Address</label><input class="input-field" value="Mirpur, Dhaka"/></div>
      <button class="btn btn-kinetic btn-full" onclick="showSaved()">Save Changes</button>

}

function renderStatement(){
  return`
    <button class="back-btn" onclick="closeProfileSection()">← Back</button>
    <h1 style="font-size:1.4rem;font-weight:900;letter-spacing:-.02em;margin-bottom:1.5rem">Statement</h1>
    <div class="grid-2 mb-3">
      <div class="sfc" style="text-align:center"><div class="text-label">Total Saved</div><div style="font-size:1.3rem;font-weight:900;color:var(--primary)">BDT 12,450</div></div>
      <div class="sfc" style="text-align:center"><div class="text-label">Cycles</div><div style="font-size:1.3rem;font-weight:900">6</div></div>
    </div>
    <div class="sfc mb-3">
      <table class="data-table">
        <thead><tr>${['Month','Circle','Paid','Status'].map(h=>`<th>${h}</th>`).join('')}</tr></thead>
        <tbody>${[['Oct 2025','Mirpur Samity A','2,000','Paid'],['Nov 2025','Mirpur Samity A','2,000','Paid'],['Dec 2025','Mirpur Samity A','2,000','Paid'],['Jan 2026','Mirpur Samity A','2,000','Paid'],['Feb 2026','Mirpur Samity A','2,000','Paid'],['Mar 2026','Mirpur Samity A','2,000','Paid']].map(([m,c,p,s])=>`
          <tr><td>${m}</td><td class="text-xs">${c}</td><td style="font-weight:700;color:var(--tertiary)">BDT ${p}</td><td>${statusDot('Paid')}<span class="text-xs" style="color:var(--tertiary);font-weight:700">${s}</span></td></tr>`).join('')}
        </tbody>
      </table>
    </div>
    <button class="btn btn-tonal btn-full">⬇️ Download PDF Statement</button>`;
}

function renderChat(){
  const log=STATE.chatLog;
  return`
    <button class="back-btn" onclick="closeProfileSection()">← Back</button>
    <h1 style="font-size:1.15rem;font-weight:900;margin-bottom:1rem">Jomaboi AI Assistant</h1>
    <div id="chat-log" style="display:flex;flex-direction:column;gap:.75rem;margin-bottom:1rem;min-height:200px">
      ${log.map(m=>`
        <div style="display:flex;justify-content:${m.from==='user'?'flex-end':'flex-start'};align-items:flex-end;gap:8px">
          ${m.from==='agent'?`<div style="width:28px;height:28px;background:var(--hero);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0">🤖</div>`:''}
          <div style="max-width:78%;padding:10px 14px;border-radius:${m.from==='user'?'18px 18px 4px 18px':'18px 18px 18px 4px'};background:${m.from==='user'?'var(--primary)':'var(--surface-low)'};color:${m.from==='user'?'white':'var(--on-surface)'};font-size:.82rem;line-height:1.5">${m.text}</div>
        </div>`).join('')}
    </div>
    <div style="display:flex;gap:.6rem">
      <input class="input-field" id="chat-input" placeholder="Ask about your savings..." onkeydown="if(event.key==='Enter')sendChat()" style="flex:1;border-radius:999px"/>
      <button onclick="sendChat()" style="width:44px;height:44px;background:var(--kinetic);border:none;border-radius:999px;cursor:pointer;font-size:1.1rem;box-shadow:var(--shadow-primary);flex-shrink:0">→</button>
    </div>`;
}
function sendChat(){
  const inp=document.getElementById('chat-input');
  if(!inp||!inp.value.trim())return;
  const msg=inp.value;
  STATE.chatLog.push({from:'user',text:msg});
  const replies=['Your next contribution is BDT 2,000 — due April 1st.','Total saved this year: BDT 12,450. Great progress!','Your payout position is #5. Nasrin receives next (Position #1).','To record a payment, ask your Admin to log it.','Is there anything else I can help with?'];
  setTimeout(()=>{STATE.chatLog.push({from:'agent',text:replies[Math.floor(Math.random()*replies.length)]});render();},700);
  render();
}

function renderNominee(){
  return`
    <button class="back-btn" onclick="closeProfileSection()">← Back</button>
    <h1 style="font-size:1.4rem;font-weight:900;letter-spacing:-.02em;margin-bottom:1.5rem">Nominee Information</h1>

function closeProfileSection(){STATE.profileSection=null;render();}
function showSaved(){
  const c=document.getElementById('content');
  const saved=document.createElement('div');
  saved.style.cssText='position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--tertiary-container);color:var(--on-tertiary-container);padding:10px 20px;border-radius:999px;font-weight:700;font-size:.82rem;font-family:Manrope,sans-serif;z-index:999;box-shadow:var(--shadow-float)';
  saved.textContent='✅ Saved successfully!';
  document.body.appendChild(saved);
  setTimeout(()=>saved.remove(),2000);
}

// ═══════════════════════════════════════════════════════════════
// INIT — restore saved data from localStorage
// ═══════════════════════════════════════════════════════════════
try {
  const savedCircles = localStorage.getItem('jomaboi_circles');
  if (savedCircles) {
    const parsed = JSON.parse(savedCircles);
    if (Array.isArray(parsed) && parsed.length >= 3) {
      circles.length = 0;
      parsed.forEach(c => circles.push(c));
    }
  }
} catch(e) {}

try {
  const savedLedgers = localStorage.getItem('jomaboi_ledgers');
  if (savedLedgers) {
    const parsed = JSON.parse(savedLedgers);
    if (Array.isArray(parsed) && parsed.length >= 2) {
      ledgers.length = 0;
      parsed.forEach(l => ledgers.push(l));
    }
  }
} catch(e) {}

// Show app
document.getElementById('app').style.display='flex';
</script>
